<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DigiCare+</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
        <link rel="shortcut icon" href="assets/favicon.png" type="image/x-icon">

    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
    <!-- ==================================== chatbot ==================================== -->
<div class="chat-tooltip" id="chatTooltip">Chat with us</div>
<!-- Toggle Button -->
<div class="toggle-btn" id="toggleBtn">
  <img src="assets/heroGirl.png" alt="">
</div>

<!-- Chatbox -->
<div class="toggle-box" id="chatBox">
  <div id="deployment-a43ee0d6-df9d-4842-8138-d7e5818507f8" style="height:100%;"></div>
</div>
  <script src="https://studio.pickaxe.co/api/embed/bundle.js" defer></script>

<body>
    <div class="auth-wrapper">
        <div class="auth-card glass-card fade-in-up">
            <div class="auth-header">
                <div class="icon-circle bg-success-light mx-auto mb-4" style="width: 60px; height: 60px; font-size: 1.5rem;">
                    <i class="fa-solid fa-envelope-circle-check text-success"></i>
                </div>
                <h2>Verify Your Email</h2>
                <p class="text-muted">We have sent an OTP to your email address. Please enter it below to verify your account.</p>
            </div>
            
            <form id="verifyForm">
                <div class="form-group">
                    <label class="form-label" for="email">Email Address</label>
                    <i class="fa-solid fa-envelope input-icon"></i>
                    <input type="email" id="email" name="email" class="form-control has-icon" placeholder="DigiCaredragon05@gmail.com" required>
                </div>
                
                <div class="form-group">
                    <label class="form-label" for="otp">One-Time Password (OTP)</label>
                    <i class="fa-solid fa-shield-halved input-icon"></i>
                    <input type="text" id="otp" name="otp" class="form-control has-icon" placeholder="Enter 6-digit OTP" required>
                </div>
                
                <button type="submit" id="verifyBtn" class="btn btn-primary w-full pulse-hover mt-4">
                    Verify Account
                </button>
            </form>
            
            <div class="auth-footer mt-4">
                <p class="text-muted">Didn't receive the OTP? <a href="#" id="resendOtp" class="font-medium text-primary">Resend OTP</a></p>
                <div class="mt-4">
                    <a href="login.html" class="text-muted hover-primary text-sm">Return to Login</a>
                </div>
            </div>
        </div>
    </div>
    
    <div id="toast-container" class="toast-container"></div>
    
    <script src="assets/js/app.js"></script>
    <script>
        // Pre-fill email from registration or allow manual entry
        document.addEventListener('DOMContentLoaded', () => {
            const savedEmail = localStorage.getItem('verify_email');
            const emailInput = document.getElementById('email');
            if (savedEmail) {
                emailInput.value = savedEmail;
            }
        });

        // Handle Resend OTP
        document.getElementById('resendOtp').addEventListener('click', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            if (!email) {
                Helpers.showToast('Email address is missing', 'error');
                return;
            }
            
            try {
                await window.AuthAPI.resendOtp(email);
                Helpers.showToast('OTP resent successfully!', 'success');
            } catch (error) {
                console.warn("Demo mode for resend OTP", error);
                Helpers.showToast('Demo: OTP resent (Backend not connected)', 'success');
            }
        });

        // Handle Verification Submission
        document.getElementById('verifyForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('verifyBtn');
            const originalText = btn.innerHTML;
            
            Helpers.setButtonLoading(btn, true);
            
            try {
                const data = Helpers.getFormData(e.target);
                
                // Assuming arg0 = email, arg1 = otp
                const response = await window.AuthAPI.verifyEmail(data.email, data.otp);
                
                Helpers.showToast(response.message || 'Account verified successfully!', 'success');
                localStorage.removeItem('verify_email'); // cleanup
                
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 2000);
            } catch (error) {
                console.warn("API Error, using mock success for demo.", error);
                if (error.message.includes('Failed to fetch') || error.message.includes('NetworkError')) {
                    Helpers.showToast('Demo: Account Verified (Backend not connected)', 'success');
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 2000);
                } else {
                    Helpers.showToast(error.message || 'Verification failed', 'error');
                }
            } finally {
                Helpers.setButtonLoading(btn, false, originalText);
            }
        });
    </script>
</body>
</html>
