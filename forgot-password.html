<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DigiCare+</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
        <link rel="shortcut icon" href="assets/favicon.png" type="image/x-icon">

    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<style>
    .logo img {
        height: 50px;
        width: 50px;
        /* display: flex; */
        align-items: center;
        /* gap: 10px; */
    }
    
</style>
    
<!-- ==================================== chatbot ==================================== -->
<div class="chat-tooltip" id="chatTooltip">Chat with us</div>
<!-- Toggle Button -->
<div class="toggle-btn" id="toggleBtn">
  <img src="assets/heroGirl.png" alt="">
</div>

<!-- Chatbox -->
<div class="toggle-box" id="chatBox">
  <div id="deployment-a43ee0d6-df9d-4842-8138-d7e5818507f8" style="height:100%;"></div>
</div>
  <script src="https://studio.pickaxe.co/api/embed/bundle.js" defer></script>

<body>
    <div class="auth-wrapper">
        <div class="auth-card glass-card fade-in-up">
            <div class="auth-header">
                <a href="index.html" class="logo">
                    <img src="assets/favicon.png" alt="">DigiCare+
                </a>
                <h2 class="mt-4">Forgot Password</h2>
                <p class="text-muted">Enter your email address and we'll send you an OTP to reset your password.</p>
            </div>
            
            <form id="forgotForm">
                <div class="form-group">
                    <label class="form-label" for="email">Email Address</label>
                    <i class="fa-solid fa-envelope input-icon"></i>
                    <input type="email" id="email" name="email" class="form-control has-icon" placeholder="DigiCaredragon05@gmail.com" required>
                </div>
                
                <button type="submit" id="submitBtn" class="btn btn-primary w-full pulse-hover mt-4">
                    Send Reset OTP <i class="fa-solid fa-paper-plane ml-2"></i>
                </button>
            </form>
            
            <div class="auth-footer mt-8">
                <a href="login.html" class="text-muted hover-primary">
                    <i class="fa-solid fa-arrow-left mr-2"></i> Back to Login
                </a>
            </div>
        </div>
    </div>
    
    <div id="toast-container" class="toast-container"></div>
    
    <script src="assets/js/app.js"></script>
    <script>
        document.getElementById('forgotForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const originalText = btn.innerHTML;
            
            Helpers.setButtonLoading(btn, true);
            
            try {
                const data = Helpers.getFormData(e.target);
                
                const response = await window.AuthAPI.forgotPassword(data.email);
                
                Helpers.showToast(response.message || 'OTP has been sent to your email!', 'success');
                
                // Store email temporarily for the reset password screen
                localStorage.setItem('reset_email', data.email);
                
                setTimeout(() => {
                    window.location.href = 'reset-password.html';
                }, 2000);
            } catch (error) {
                console.warn("API Error, using mock success for demo.", error);
                if (error.message.includes('Failed to fetch') || error.message.includes('NetworkError')) {
                    Helpers.showToast('Demo: OTP Sent (Backend not connected)', 'success');
                    localStorage.setItem('reset_email', Helpers.getFormData(e.target).email);
                    setTimeout(() => {
                        window.location.href = 'reset-password.html';
                    }, 2000);
                } else {
                    Helpers.showToast(error.message || 'Action failed', 'error');
                }
            } finally {
                Helpers.setButtonLoading(btn, false, originalText);
            }
        });
    </script>
</body>
</html>
