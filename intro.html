<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>DigiCare+</title>
  <link rel="shortcut icon" href="assets/favicon.png" type="image/x-icon">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family:'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
    }

    body {
      height: 100vh;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;

    }

    .logo-container {
      text-align: center;
      animation: fadeOut 1s ease forwards;
      animation-delay: 3s;
    }

    .logo {
      width: 120px;
      animation: zoomIn 1.5s ease, glow 2s infinite alternate;
    }

    h1 {
      color: #fff;
      margin-top: 15px;
      font-size: 28px;
      letter-spacing: 2px;
      animation: fadeIn 2s ease;
    }

    /* Animations */
    @keyframes zoomIn {
      0% {
        transform: scale(0);
        opacity: 0;
      }
      100% {
        transform: scale(1);
        opacity: 1;
      }
    }

    @keyframes glow {
      from {
        filter: drop-shadow(0 0 5px rgb(0, 0, 0));
      }
      to {
        filter: drop-shadow(0 0 20px rgb(6, 6, 10));
      }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes fadeOut {
      to {
        opacity: 0;
        transform: scale(1.2);
      }
    }
  </style>
</head>

<body>

  <div class="logo-container">
    <img src="assets/favicon.png" class="logo" alt="Logo">
    <h1>DigiCare+</h1>
  </div>

  <script>
  setTimeout(() => {
    // Mark intro as played
    sessionStorage.setItem("introPlayed", "true");

    // Redirect to index
    window.location.href = "index.html";
  }, 5000);
</script>

</body>
</html>
