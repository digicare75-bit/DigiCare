<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DigiCare+</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
        <link rel="shortcut icon" href="assets/favicon.png" type="image/x-icon">
    
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        .dashboard-container { max-width: 1200px; margin: 100px auto 40px; padding: 0 20px; display: grid; grid-template-columns: 280px 1fr; gap: 2rem; }
        .sidebar-menu { display: flex; flex-direction: column; gap: 0.5rem; margin-top: 1.5rem; }
        .sidebar-link { padding: 1rem; border-radius: 12px; color: var(--text-color); cursor: pointer; transition: all 0.3s ease; display: flex; align-items: center; gap: 1rem; }
        .sidebar-link:hover, .sidebar-link.active { background: rgba(13, 138, 188, 0.1); color: var(--primary-color); }
        .profile-img-lg { width: 100px; height: 100px; border-radius: 50%; object-fit: cover; border: 4px solid var(--primary-color); margin: 0 auto 1rem; background-color: var(--primary-light); display: flex; align-items: center; justify-content: center; font-size: 2.5rem; color: var(--primary-color); }
        
        .table-container { overflow-x: auto; background: rgba(255, 255, 255, 0.5); border-radius: 12px; padding: 1rem; margin-top: 1rem; }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 1rem; border-bottom: 2px solid rgba(0,0,0,0.1); color: var(--text-muted); font-weight: 600; }
        td { padding: 1rem; border-bottom: 1px solid rgba(0,0,0,0.05); }
        tr:last-child td { border-bottom: none; }
        
        .section-title { font-family: 'Outfit', sans-serif; font-size: 1.5rem; font-weight: 600; margin-bottom: 1.5rem; display: flex; align-items: center; gap: 0.5rem; }
        
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); align-items: center; justify-content: center; z-index: 1000; }
        .modal.active { display: flex; }
        .modal-content { background: white; padding: 2rem; border-radius: 12px; width: 100%; max-width: 500px; }

        @media (max-width: 768px) {
            .dashboard-container { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body class="pattern-bg">

    <nav class="navbar glass">
        <div class="nav-container">
            <a href="index.html" class="logo">
                <img src="assets/favicon.png" alt="">DigiCare+ <span class="text-xs text-primary ml-1">Pharmacy</span>
            </a>
            <div class="nav-links" id="nav-links"></div>
            <button class="menu-toggle"><i class="fa-solid fa-bars"></i></button>
        </div>
    </nav>

    <div class="dashboard-container fade-in-up">
        <!-- Sidebar -->
        <div class="dashboard-sidebar">
            <div class="glass-card text-center py-8">
                <div class="profile-img-lg"><i class="fa-solid fa-store"></i></div>
                <h3 class="m-0" id="userName">Loading...</h3>
                <span class="badge bg-primary text-white text-xs mt-2 inline-block px-3 py-1 rounded-full">Pharmacy Access</span>
                
                <div class="sidebar-menu text-left mt-6">
                    <div class="sidebar-link active" onclick="switchTab('categories')">
                        <i class="fa-solid fa-tags w-5 text-center"></i> Medicine Categories
                    </div>
                    <div class="sidebar-link opacity-50 cursor-not-allowed" title="Coming Soon">
                        <i class="fa-solid fa-pills w-5 text-center"></i> Medicines
                    </div>
                    <div class="sidebar-link opacity-50 cursor-not-allowed" title="Coming Soon">
                        <i class="fa-solid fa-file-prescription w-5 text-center"></i> Prescriptions
                    </div>
                    <div class="sidebar-link opacity-50 cursor-not-allowed" title="Coming Soon">
                        <i class="fa-solid fa-cart-shopping w-5 text-center"></i> Orders
                    </div>
                    <div class="sidebar-link mt-4 text-danger" onclick="logout()">
                        <i class="fa-solid fa-right-from-bracket w-5 text-center"></i> Logout
                    </div>
                </div>
            </div>
        </div>

        <!-- Main Content -->
        <div class="dashboard-content">
            
            <!-- Categories Tab -->
            <div id="categoriesTab" class="glass-card">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="section-title m-0"><i class="fa-solid fa-tags text-primary"></i> Medicine Categories</h2>
                    <button class="btn btn-primary btn-sm pulse-hover" onclick="openCategoryModal()">
                        <i class="fa-solid fa-plus"></i> Add Category
                    </button>
                </div>
                
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th style="width: 50px;">ID</th>
                                <th>Category Name</th>
                                <th>Description</th>
                                <th style="width: 150px;">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="categoriesTableBody">
                            <tr><td colspan="4" class="text-center">Loading categories...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>

        </div>
    </div>

    <!-- Category Modal -->
    <div id="categoryModal" class="modal">
        <div class="modal-content glass-card">
            <h3 class="mt-0 mb-4" id="categoryModalTitle">Add New Category</h3>
            <form id="categoryForm">
                <input type="hidden" id="categoryId">
                <div class="form-group">
                    <label class="form-label">Category Name</label>
                    <input type="text" id="categoryName" class="form-control" placeholder="e.g. Painkillers" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Description</label>
                    <textarea id="categoryDescription" class="form-control" rows="3" placeholder="Brief description of the category" required></textarea>
                </div>
                <div class="flex justify-end mt-4 gap-2">
                    <button type="button" class="btn btn-outline" onclick="closeCategoryModal()">Cancel</button>
                    <button type="submit" class="btn btn-primary" id="saveCategoryBtn">Save Category</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Toast Notification Container -->
    <div id="toast-container" class="toast-container"></div>

    <script src="assets/js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const token = localStorage.getItem('token');
            const user = JSON.parse(localStorage.getItem('user') || '{}');
            
            // Allow ADMIN and PHARMACY roles to access
            if (!token || !['ADMIN', 'PHARMACY'].includes(user.role)) {
                window.location.href = 'login.html';
                return;
            }

            document.getElementById('userName').textContent = user.firstName + ' ' + (user.lastName || '');

            document.getElementById('nav-links').innerHTML = `
                <div class="nav-user profile-dropdown">
                     <div class="avatar avatar-sm">${Helpers.getAvatarHtml(user.profileImageUrl, user.firstName + ' ' + (user.lastName || ''), 'avatar-sm')}</div>
                    <span>${user.firstName}</span>
                </div>
            `;

            loadCategories();
        });

        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            window.location.href = 'login.html';
        }

        function switchTab(tabId) {
            // Placeholder: When other tabs are implemented, logic goes here
        }

        // Category Management
        async function loadCategories() {
            const tbody = document.getElementById('categoriesTableBody');
            tbody.innerHTML = '<tr><td colspan="4" class="text-center"><span class="spinner"></span> Fetching...</td></tr>';
            try {
                const categories = await window.CategoryAPI.getAll();
                if (categories.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="4" class="text-center text-muted">No categories found. Click Add to create one.</td></tr>';
                    return;
                }

                // Sort by ID naturally
                categories.sort((a,b) => a.id - b.id);

                tbody.innerHTML = categories.map(c => `
                    <tr>
                        <td class="font-mono text-muted">#${c.id}</td>
                        <td class="font-medium">${c.name}</td>
                        <td class="text-sm">${c.description || '-'}</td>
                        <td>
                            <div class="flex gap-2">
                                <button class="btn btn-sm btn-outline-primary" style="padding: 0.25rem 0.5rem" onclick="editCategory(${c.id}, '${escapeQuote(c.name)}', '${escapeQuote(c.description)}')">
                                    <i class="fa-solid fa-pen"></i>
                                </button>
                                <button class="btn btn-sm btn-outline-danger" style="padding: 0.25rem 0.5rem" onclick="deleteCategory(${c.id})">
                                    <i class="fa-solid fa-trash"></i>
                                </button>
                            </div>
                        </td>
                    </tr>
                `).join('');
            } catch (error) {
                tbody.innerHTML = `<tr><td colspan="4" class="text-center text-danger"><i class="fa-solid fa-triangle-exclamation"></i> Error loading categories</td></tr>`;
                Helpers.showToast('Failed to load categories', 'error');
            }
        }

        function escapeQuote(str) {
            if (!str) return '';
            return str.replace(/'/g, "\\'").replace(/"/g, '&quot;');
        }

        function openCategoryModal(isEdit = false) {
            document.getElementById('categoryModalTitle').textContent = isEdit ? 'Edit Category' : 'Add New Category';
            document.getElementById('categoryModal').classList.add('active');
        }

        function closeCategoryModal() {
            document.getElementById('categoryModal').classList.remove('active');
            document.getElementById('categoryForm').reset();
            document.getElementById('categoryId').value = '';
        }

        function editCategory(id, name, desc) {
            document.getElementById('categoryId').value = id;
            document.getElementById('categoryName').value = name;
            document.getElementById('categoryDescription').value = desc;
            openCategoryModal(true);
        }

        async function deleteCategory(id) {
            if (!confirm("Are you sure you want to delete this category? This action cannot be undone.")) return;
            try {
                await window.CategoryAPI.delete(id);
                Helpers.showToast("Category deleted successfully", "success");
                loadCategories();
            } catch (e) {
                Helpers.showToast("Cannot delete: " + e.message, "error");
            }
        }

        document.getElementById('categoryForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('categoryId').value;
            const payload = {
                name: document.getElementById('categoryName').value,
                description: document.getElementById('categoryDescription').value
            };

            const btn = document.getElementById('saveCategoryBtn');
            const og = btn.innerHTML;
            Helpers.setButtonLoading(btn, true);

            try {
                if (id) {
                    await window.CategoryAPI.update(id, payload);
                    Helpers.showToast('Category updated!', 'success');
                } else {
                    await window.CategoryAPI.create(payload);
                    Helpers.showToast('Category created!', 'success');
                }
                closeCategoryModal();
                loadCategories();
            } catch (error) {
                Helpers.showToast('Save failed: ' + error.message, 'error');
            } finally {
                Helpers.setButtonLoading(btn, false, og);
            }
        });
    </script>
</body>
</html>
