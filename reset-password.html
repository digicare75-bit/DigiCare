<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DigiCare+</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
        <link rel="shortcut icon" href="assets/favicon.png" type="image/x-icon">
    
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <div class="auth-wrapper">
        <div class="auth-card glass-card fade-in-up">
            <div class="auth-header">
                <div class="icon-circle bg-primary-light mx-auto mb-4" style="width: 60px; height: 60px; font-size: 1.5rem;">
                    <i class="fa-solid fa-key text-primary"></i>
                </div>
                <h2>Reset Password</h2>
                <p class="text-muted">Enter the OTP sent to your email and your new password.</p>
            </div>
            
            <form id="resetForm">
                <div class="form-group">
                    <label class="form-label" for="email">Email</label>
                    <i class="fa-solid fa-envelope input-icon"></i>
                    <input type="email" id="email" name="email" class="form-control has-icon" placeholder="DigiCaredragon05@gmail.com" required readonly>
                </div>
                
                <div class="form-group">
                    <label class="form-label" for="otp">One-Time Password (OTP)</label>
                    <i class="fa-solid fa-shield-halved input-icon"></i>
                    <input type="text" id="otp" name="otp" class="form-control has-icon" placeholder="Enter 6-digit OTP" required>
                </div>
                
                <div class="form-group">
                    <label class="form-label" for="newPassword">New Password</label>
                    <i class="fa-solid fa-lock input-icon"></i>
                    <input type="password" id="newPassword" name="newPassword" class="form-control has-icon" placeholder="••••••••" required>
                </div>
                
                <button type="submit" id="resetBtn" class="btn btn-primary w-full pulse-hover mt-4">
                    Reset Password
                </button>
            </form>
            
            <div class="auth-footer mt-4">
                <p class="text-muted">Didn't receive code? <a href="#" id="resendOtp" class="font-medium text-primary">Resend OTP</a></p>
                <div class="mt-4">
                    <a href="login.html" class="text-muted hover-primary text-sm">Return to Login</a>
                </div>
            </div>
        </div>
    </div>
    
    <div id="toast-container" class="toast-container"></div>
    
    <script src="assets/js/app.js"></script>
    <script>
        // Pre-fill email
        document.addEventListener('DOMContentLoaded', () => {
            const savedEmail = localStorage.getItem('reset_email');
            if (savedEmail) {
                document.getElementById('email').value = savedEmail;
            }
        });

        // Handle Resend OTP
        document.getElementById('resendOtp').addEventListener('click', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            if (!email) {
                Helpers.showToast('Email address is missing', 'error');
                return;
            }
            
            try {
                await window.AuthAPI.resendOtp(email);
                Helpers.showToast('OTP resent successfully!', 'success');
            } catch (error) {
                console.warn("Demo mode for resend OTP", error);
                Helpers.showToast('Demo: OTP resent (Backend not connected)', 'success');
            }
        });

        // Handle Reset Submission
        document.getElementById('resetForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('resetBtn');
            const originalText = btn.innerHTML;
            
            Helpers.setButtonLoading(btn, true);
            
            try {
                const data = Helpers.getFormData(e.target);
                
                const response = await window.AuthAPI.resetPassword(data.email, data.otp, data.newPassword);
                
                Helpers.showToast(response.message || 'Password reset successfully!', 'success');
                localStorage.removeItem('reset_email'); // cleanup
                
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 2000);
            } catch (error) {
                console.warn("API Error, using mock success for demo.", error);
                if (error.message.includes('Failed to fetch') || error.message.includes('NetworkError')) {
                    Helpers.showToast('Demo: Password Reset Successful (Backend not connected)', 'success');
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 2000);
                } else {
                    Helpers.showToast(error.message || 'Reset failed', 'error');
                }
            } finally {
                Helpers.setButtonLoading(btn, false, originalText);
            }
        });
    </script>
</body>
</html>
