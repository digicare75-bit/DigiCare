<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DigiCare+</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
        <link rel="shortcut icon" href="assets/favicon.png" type="image/x-icon">

    <link rel="stylesheet" href="assets/css/style.css">
</head>
<style>
    .logo img {
        height: 50px;
        width: 50px;
        /* display: flex; */
        align-items: center;
        /* gap: 10px; */
    }
    
</style>
    <!-- ==================================== chatbot ==================================== -->
<div class="chat-tooltip" id="chatTooltip">Chat with us</div>
<!-- Toggle Button -->
<div class="toggle-btn" id="toggleBtn">
  <img src="assets/heroGirl.png" alt="">
</div>

<!-- Chatbox -->
<div class="toggle-box" id="chatBox">
  <div id="deployment-a43ee0d6-df9d-4842-8138-d7e5818507f8" style="height:100%;"></div>
</div>
  <script src="https://studio.pickaxe.co/api/embed/bundle.js" defer></script>

<body>
    <div class="auth-wrapper" style="align-items: flex-start; padding-top: 4rem; padding-bottom: 4rem;">
        <div class="auth-card glass-card fade-in-up" style="max-width: 600px;">
            <div class="auth-header" style="margin-bottom: 1.5rem;">
                <a href="index.html" class="logo">
                    <img src="assets/favicon.png" alt="">DigiCare+
                </a>
                <h2 class="mt-4">Create an Account</h2>
                <p class="text-muted">Join our revolutionary healthcare platform today.</p>
            </div>
            
            <div class="auth-tabs pattern-bg">
                <div class="auth-tab active" data-role="patient">
                    <i class="fa-solid fa-user mr-2"></i> Patient
                </div>
                <div class="auth-tab" data-role="doctor">
                    <i class="fa-solid fa-user-md mr-2"></i> Doctor
                </div>
            </div>
            
            <form id="registerForm">
                <input type="hidden" id="userRole" name="role" value="patient">
                
                <!-- Common Fields -->
                <div class="grid grid-2 gap-4">
                    <div class="form-group">
                        <label class="form-label" for="firstName">First Name</label>
                        <input type="text" id="firstName" name="firstName" class="form-control" placeholder="Digicare" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="lastName">Last Name</label>
                        <input type="text" id="lastName" name="lastName" class="form-control" placeholder="Dragon" required>
                    </div>
                </div>
                
                <div class="form-group">
                    <label class="form-label" for="email">Email Address</label>
                    <i class="fa-solid fa-envelope input-icon"></i>
                    <input type="email" id="email" name="email" class="form-control has-icon" placeholder="DigiCaredragon05@gmail.com" required>
                </div>
                
                <div class="grid grid-2 gap-4">
                    <div class="form-group">
                        <label class="form-label" for="phone">Phone Number</label>
                        <input type="tel" id="phone" name="phone" class="form-control" placeholder="1234567890" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="password">Password</label>
                        <input type="password" id="password" name="password" class="form-control" placeholder="..........." required>
                    </div>
                </div>
                
                <!-- Patient Specific Fields -->
                <div id="patientFields" class="fade-in">
                    <div class="divider">Patient Details</div>
                    <div class="grid grid-2 gap-4">
                        <div class="form-group">
                            <label class="form-label" for="dateOfBirth">Date of Birth</label>
                            <input type="date" id="dateOfBirth" name="dateOfBirth" class="form-control">
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="gender">Gender</label>
                            <select id="gender" name="gender" class="form-control">
                                <option value="">Select Gender</option>
                                <option value="Male">Male</option>
                                <option value="Female">Female</option>
                                <option value="Other">Other</option>
                            </select>
                        </div>
                    </div>
                    <div class="grid grid-2 gap-4">
                        <div class="form-group">
                            <label class="form-label" for="bloodGroup">Blood Group</label>
                            <input type="text" id="bloodGroup" name="bloodGroup" class="form-control" placeholder="e.g. O+">
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="occupation">Occupation</label>
                            <input type="text" id="occupation" name="occupation" class="form-control" placeholder="e.g.Student,Engineer,Teacher,etc.">
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="address">Address</label>
                        <input type="text" id="address" name="address" class="form-control" placeholder="e.g. House No., Street, City, State, Country, Pincode">
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="medicalHistory">Medical History (Brief)</label>
                        <textarea id="medicalHistory" name="medicalHistory" class="form-control" placeholder="e.g. Diabetes, High BP, Asthma, or Write None " rows="2"></textarea>
                    </div>
                </div>
                
                <!-- Doctor Specific Fields -->
                <div id="doctorFields" class="hidden fade-in">
                    <div class="divider">Professional Details</div>
                    <div class="grid grid-2 gap-4">
                        <div class="form-group">
                            <label class="form-label" for="specialization">Specialization</label>
                            <input type="text" id="specialization" name="specialization" class="form-control" placeholder="e.g. Cardiologist">
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="experience">Experience (Years)</label>
                            <input type="text" id="experience" name="experience" class="form-control" placeholder="5">
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="qualifications">Qualifications</label>
                        <input type="text" id="qualifications" name="qualifications" class="form-control" placeholder="MBBS, MD, BDS">
                    </div>
                    <div class="grid grid-2 gap-4">
                        <div class="form-group">
                            <label class="form-label" for="registrationNumber">Registration Number</label>
                            <input type="text" id="registrationNumber" name="registrationNumber" class="form-control" placeholder="e.g., MCI/12345">
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="clinicName">Clinic/Hospital Name</label>
                            <input type="text" id="clinicName" name="clinicName" class="form-control" placeholder="DigiCare Hospital, DigiCare Clinic">
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="clinicAddress">Clinic Address</label>
                        <input type="text" id="clinicAddress" name="clinicAddress" class="form-control" placeholder="e.g. House No., Street, City, State, Country, Pincode">
                    </div>
                    <div class="grid grid-2 gap-4">
                        <div class="form-group">
                            <label class="form-label" for="onlineConsultationFee">Online Fee ($)</label>
                            <input type="number" id="onlineConsultationFee" name="onlineConsultationFee" class="form-control" value="0" placeholder="e.g. 100">
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="offlineConsultationFee">Offline Fee ($)</label>
                            <input type="number" id="offlineConsultationFee" name="offlineConsultationFee" class="form-control" value="0" placeholder="e.g. 50">
                        </div>
                    </div>
                </div>
                
                <button type="submit" id="registerBtn" class="btn btn-primary w-full pulse-hover mt-4">
                    <i class="fa-solid fa-user-plus mr-2"></i> Register Account
                </button>
            </form>
            
            <div class="auth-footer">
                <p class="text-muted">Already have an account? <a href="login.html" class="font-medium text-primary">Log in here</a></p>
            </div>
        </div>
    </div>
    
    <div id="toast-container" class="toast-container"></div>
    
    <script src="assets/js/app.js"></script>
    <script>
        // Tab switching logic
        const tabs = document.querySelectorAll('.auth-tab');
        const patientFields = document.getElementById('patientFields');
        const doctorFields = document.getElementById('doctorFields');
        const roleInput = document.getElementById('userRole');
        
        tabs.forEach(tab => {
            tab.addEventListener('click', () => {
                // Update tabs
                tabs.forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                
                const role = tab.getAttribute('data-role');
                roleInput.value = role;
                
                // Toggle fields
                if (role === 'patient') {
                    patientFields.classList.remove('hidden');
                    doctorFields.classList.add('hidden');
                    // Disable inputs in doctor fields to avoid validation issues
                    disableInputs(doctorFields, true);
                    disableInputs(patientFields, false);
                } else {
                    doctorFields.classList.remove('hidden');
                    patientFields.classList.add('hidden');
                    disableInputs(patientFields, true);
                    disableInputs(doctorFields, false);
                }
            });
        });

        function disableInputs(container, disable) {
            const inputs = container.querySelectorAll('input, select, textarea');
            inputs.forEach(input => {
                input.disabled = disable;
            });
        }
        
        // Initial setup
        disableInputs(doctorFields, true);

        // Handle Form Submission
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('registerBtn');
            const originalText = btn.innerHTML;
            
            Helpers.setButtonLoading(btn, true);
            
            try {
                const data = Helpers.getFormData(e.target);
                const role = data.role;
                delete data.role; // Remove role from payload
                
                let response;
                
                // Adjust types Based on API definitions
                if (role === 'doctor') {
                    data.onlineConsultationFee = Number(data.onlineConsultationFee);
                    data.offlineConsultationFee = Number(data.offlineConsultationFee);
                    data.isOnline = true;
                    response = await window.AuthAPI.registerDoctor(data);
                } else {
                    data.contactNumber = data.phone; 
                    data.medicalDocumentUrl = ""; // Default empty
                    response = await window.AuthAPI.registerPatient(data);
                }
                
                // Support mocking success if backend is offline
                Helpers.showToast(response.message || 'Registration successful!', 'success');
                
                // Store email for verification page
                localStorage.setItem('verify_email', data.email);
                
                setTimeout(() => {
                    window.location.href = 'verify-email.html';
                }, 1500);
                
            } catch (error) {
                console.warn("API Error, using mock success for demo.", error);
                if (error.message.includes('Failed to fetch') || error.message.includes('NetworkError')) {
                    Helpers.showToast('Demo: Registration mock successful (Backend not connected)', 'success');
                    
                    // Store email for verification page
                    localStorage.setItem('verify_email', data.email);
                    
                    setTimeout(() => {
                        window.location.href = 'verify-email.html';
                    }, 1500);
                } else {
                    Helpers.showToast(error.message || 'Registration failed', 'error');
                }
            } finally {
                Helpers.setButtonLoading(btn, false, originalText);
            }
        });
    </script>
</body>
</html>
